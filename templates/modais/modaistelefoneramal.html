<div class="modal fade" id="modalVisualizarPessoasRamal" tabindex="-1">

      <div class="modal-header">
        <h5 class="modal-title">Telefones vinculados ao Ramal</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

      <!-- BODY -->
      <div class="modal-body">

        <!-- 🔔 INFO DO RAMAL -->

          <strong>Ramal:</strong>
          <span id="labelNumeroRamal"></span>

                <th>Serial</th>
                <th>Nome</th>
                <th>Funcional</th>
                <th>CPF</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Sair</button>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="modalAdicionarPessoaRamal" tabindex="-1">

        </div>

                <th>Serial</th>

              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>


      </div>

      <div class="modal-footer">

        </button>
        <button class="btn btn-primary" onclick="salvarTelefoneRamal()">
          Vincular
        </button>
      </div>

    </div>
  </div>
</div>
