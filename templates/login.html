<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
<link rel="icon" type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath fill='%23007bff' d='M3.654 1.328a.678.678 0 0 1 .737-.143l2.522 1.01c.329.132.445.507.261.817L6.29 4.561a.678.678 0 0 0 .145.745l3.006 3.006a.678.678 0 0 0 .745.145l1.55-.883c.31-.184.685-.068.817.261l1.01 2.522a.678.678 0 0 1-.143.737l-1.2 1.2c-.86.86-2.133 1.09-3.237.56a18.6 18.6 0 0 1-7.588-7.588c-.53-1.104-.3-2.377.56-3.237l1.2-1.2z'/%3E%3C/svg%3E">

<header>
    <img src="{{ url_for('static', filename='img/img-logoPiracicaba.png') }}" alt="Logo">
</header>

<main>
    <form class="tela-login" action="/login" method="POST">

        <input type="email" name="email" placeholder="E-mail" required>
        <input type="password" name="senha" placeholder="Senha" required>
        {% with messages = get_flashed_messages() %}
                {% if messages %}
                <p class="mensagem-erro">{{ messages[0] }}</p>
                {% endif %}
                {% endwith %}
        <button type="submit" class="entrar">Entrar</button>

    </form>
</main>
